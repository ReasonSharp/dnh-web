@if (!isLoggedIn) {
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">Admin prijava</h4>
            <div class="mb-3">
              <label class="form-label">Korisničko ime</label>
              <input type="text" class="form-control" [(ngModel)]="username" name="username" (keyup.enter)="login()">
            </div>
            <div class="mb-3">
              <label class="form-label">Lozinka</label>
              <input type="password" class="form-control" [(ngModel)]="password" name="password" (keyup.enter)="login()">
            </div>
            <button class="btn btn-primary w-100" (click)="login()">Prijava</button>
          </div>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="container-fluid py-4">
    <div class="row g-4">
      <div class="col-md-3 col-lg-2">
        <div class="admin-sidebar">
          <div class="sidebar-title">Admin panel</div>
          <nav class="nav flex-column">
            <a class="nav-link" routerLink="upload" routerLinkActive="active">Upload slike</a>
            <a class="nav-link" routerLink="upload-document" routerLinkActive="active">Upload dokumenta</a>
            <a class="nav-link" routerLink="edit-details" routerLinkActive="active">Uredi podatke</a>
            <a class="nav-link" routerLink="change-password" routerLinkActive="active">Promjena lozinke</a>
            <a class="nav-link" routerLink="logout" routerLinkActive="active">Odjava</a>
          </nav>
        </div>
      </div>
      <div class="col-md-9 col-lg-10">
        <div class="card shadow-sm">
          <div class="card-body p-0">
            <router-outlet></router-outlet>
          </div>
        </div>
      </div>
    </div>
  </div>
}
