<div class="p-4">
  <h4 class="mb-4">Nova obavijest</h4>

  <div class="mb-3">
    <label class="form-label">Tagline <span class="text-danger">*</span></label>
    <input type="text" class="form-control" [(ngModel)]="blurb" name="blurb" placeholder="Kratki opis obavijesti">
  </div>

  <div class="mb-3">
    <label class="form-label">Slika <span class="text-danger">*</span></label>
    <app-image-picker [(selectedUrl)]="imageUrl"></app-image-picker>
    @if (imageUrl) {
      <div class="mt-2">
        <img [src]="imageUrl" class="img-thumbnail selected-preview" alt="Odabrana slika">
      </div>
    }
  </div>

  <div class="mb-3">
    <label class="form-label">Dodatak</label>
    <div class="d-flex gap-4">
      <div class="form-check">
        <input class="form-check-input" type="radio" id="ca-none" name="mode" value="none" [(ngModel)]="mode">
        <label class="form-check-label" for="ca-none">Bez dodatka</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" id="ca-link" name="mode" value="link" [(ngModel)]="mode">
        <label class="form-check-label" for="ca-link">URL</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" id="ca-body" name="mode" value="body" [(ngModel)]="mode">
        <label class="form-check-label" for="ca-body">Članak</label>
      </div>
    </div>
  </div>

  @if (mode === 'link') {
    <div class="mb-3">
      <label class="form-label">URL</label>
      <input type="url" class="form-control" [(ngModel)]="link" name="link" placeholder="https://...">
    </div>
  }
  @if (mode === 'body') {
    <div class="mb-3">
      <label class="form-label">Članak</label>
      <textarea class="form-control" [(ngModel)]="body" name="body" rows="6"></textarea>
    </div>
  }

  <button type="button" class="btn btn-primary" (click)="submit()">Dodaj obavijest</button>

  @if (message) {
    <div class="alert mt-3" [class]="success ? 'alert-success' : 'alert-danger'">{{ message }}</div>
  }
</div>
