<div class="p-4">
  <h4 class="mb-4">Promjena lozinke</h4>
  <div class="mb-3">
    <label class="form-label">Stara lozinka</label>
    <input type="password" class="form-control" [(ngModel)]="oldPassword" name="oldPassword">
  </div>
  <div class="mb-3">
    <label class="form-label">Nova lozinka</label>
    <input type="password" class="form-control" [(ngModel)]="newPassword" name="newPassword">
  </div>
  <div class="mb-3">
    <label class="form-label">Potvrdi novu lozinku</label>
    <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword">
  </div>
  <button class="btn btn-primary" (click)="changePassword()">Promijeni lozinku</button>
  @if (message) {
    <div class="alert mt-3" [class]="success ? 'alert-success' : 'alert-danger'">{{ message }}</div>
  }
</div>
