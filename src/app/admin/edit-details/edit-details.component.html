<div class="p-4">
  <h4 class="mb-4">Uredi podatke</h4>
  @if (loading) {
    <div class="text-muted">Učitavanje...</div>
  } @else {
    <div class="mb-3">
      <label class="form-label">Ime</label>
      <input type="text" class="form-control" [(ngModel)]="name" name="name">
    </div>
    <button class="btn btn-primary" (click)="save()">Spremi</button>
    @if (message) {
      <div class="alert mt-3" [class]="success ? 'alert-success' : 'alert-danger'">{{ message }}</div>
    }
  }
</div>
