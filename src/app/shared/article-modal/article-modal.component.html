<div class="dialog modal-dialog modal-lg" role="dialog" (click)="$event.stopPropagation()">
  <div class="modal-content">
    <div class="modal-header">
      <h4 class="modal-title">{{ item.title || item.blurb }}</h4>
      <button type="button" class="btn-close" (click)="close()" aria-label="Zatvori"></button>
    </div>
    <div class="modal-body">
      @if (item.author || item.date) {
        <p class="text-muted small mb-3">
          {{ item.date | date:'longDate' }}@if (item.author) { &nbsp;·&nbsp;{{ item.author }} }
        </p>
      }
      @if (item.title) {
        <p class="lead mb-4">{{ item.blurb }}</p>
      }
      <div class="ql-editor article-body" [innerHTML]="safeBody"></div>
    </div>
  </div>
</div>
