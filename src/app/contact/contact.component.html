<div class="container">
    <h1>Kontakt</h1>
    <div class="d-flex flex-column mx-3">
        @for (cat of categories; track cat.id) {
            <div class="row">
                <div class="col-lg-2 col-sm-3">{{ cat.title }} </div>
                <div class="col-lg-10 col-sm-9">
                    @for (item of cat.items; track item.id) {
                        @if (item.link) {
                            <a href="{{ item.link }}">{{ item.value }}</a><br>
                        } @else {
                            {{ item.value }}<br>
                        }
                    }
                </div>
            </div>
        }
    </div>
</div>
