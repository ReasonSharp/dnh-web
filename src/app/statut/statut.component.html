<div class="container">
    <h2>Statut Društva naturista Hrvatske</h2>
    @if (current) {
      <a [href]="current.url" target="_blank">{{ current.name }}</a>
    } @else {
      <p>Trenutni statut nije dostupan.</p>
    }
    <hr>
    <h2>Arhiva statuta</h2>
    @if (archive.length > 0) {
      @for (item of archive; track item.id) {
        <div><a [href]="item.url" target="_blank">{{ item.name }}</a></div>
      }
    } @else {
      <p>Nema arhiviranih statuta.</p>
    }
</div>
